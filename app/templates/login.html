<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Autonomous DevSecOps</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-shield-halved"></i>

            Autonomous DevSecOps

        </div>

        <ul>

            <li><a href="/">Home</a></li>

            <li><a href="/upload">Upload</a></li>

        </ul>

    </nav>

</header>

<section class="hero">

    <div class="card" style="max-width:450px;width:100%;margin:auto;">

        <h2 style="margin-bottom:30px;color:#38bdf8;text-align:center;">

            <i class="fa-solid fa-user-lock"></i>

            Login

        </h2>

        <form action="/login" method="POST">

            <div style="margin-bottom:20px;">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    style="width:100%;padding:15px;border-radius:10px;border:none;margin-top:8px;">

            </div>

            <div style="margin-bottom:25px;">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    style="width:100%;padding:15px;border-radius:10px;border:none;margin-top:8px;">

            </div>

            <button
                type="submit"
                class="btn-primary"
                style="width:100%;border:none;cursor:pointer;">

                <i class="fa-solid fa-right-to-bracket"></i>

                Login

            </button>

        </form>

        <div style="margin-top:25px;text-align:center;">

            <a href="/" style="color:#38bdf8;text-decoration:none;">

                ← Back to Home

            </a>

        </div>

    </div>

</section>

<footer>

    <p>

        © 2026 Autonomous DevSecOps Framework

    </p>

</footer>

</body>

</html>
