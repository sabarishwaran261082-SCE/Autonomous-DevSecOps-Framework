name: Autonomous DevSecOps CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        cd app
        pip install -r requirements.txt
    
    - name: Run Unit Tests
      run: |
        cd app
        python -m pytest

    - name: Verify Python Version
      run: python --version

    - name: CI Pipeline Completed
      run: echo "Phase 6.1 completed successfully!"