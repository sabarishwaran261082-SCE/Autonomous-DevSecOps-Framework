
name: Autonomous DevSecOps CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Verify Python Version
      run: python --version

    - name: Install Dependencies
      run: |
        cd app
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        cd app
        python -m pytest

    - name: Run Bandit Security Scan
      run: |
        cd app
        python -m bandit -r app.py -f json -o bandit-report.json || true

    - name: Build Docker Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./app

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
        format: json
        output: app/trivy-report.json
        exit-code: 0
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Gitleaks Secret Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
        GITLEAKS_ENABLE_SUMMARY: true

    - name: Generate Gitleaks JSON Report
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/repo \
          zricethezav/gitleaks:latest detect \
          --source=/repo \
          --report-format=json \
          --report-path=/repo/app/gitleaks-report.json

    - name: Run Security Gate
      run: |
        cd app
        python security_gate.py

    - name: Run AI Root Cause Analyzer
      env:
        HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      run: |
        cd app
        python ai_root_cause.py

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          app/bandit-report.json
          app/trivy-report.json
          app/gitleaks-report.json
          app/ai-security-report.md
        if-no-files-found: warn

    - name: Generate Notification Summary
      run: |
        echo "🚀 Autonomous DevSecOps Framework" > summary.txt
        echo "" >> summary.txt
        echo "📦 Repository : ${{ github.repository }}" >> summary.txt
        echo "🌿 Branch     : ${{ github.ref_name }}" >> summary.txt
        echo "🔖 Commit     : ${{ github.sha }}" >> summary.txt
        echo "" >> summary.txt
        echo "🧪 Tests      : PASSED" >> summary.txt
        echo "🔒 Bandit     : Completed" >> summary.txt
        echo "🐳 Trivy      : Completed" >> summary.txt
        echo "🔑 Gitleaks   : Completed" >> summary.txt
        echo "🤖 AI Report  : Generated" >> summary.txt
        echo "" >> summary.txt
        echo "🛡 Security Gate : PASSED" >> summary.txt
        echo "" >> summary.txt
        echo "🚀 Deployment : EC2 Successful" >> summary.txt
        echo "" >> summary.txt
        echo "🔗 Run : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> summary.txt
        echo "" >> summary.txt
        echo "⏰ Time : $(date -u)" >> summary.txt

    - name: Upload Notification Summary
      uses: actions/upload-artifact@v4
      with:
        name: notification-summary
        path: summary.txt

    - name: Push Docker Image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e
          cd /home/ec2-user
          chmod +x deploy.sh
          ./deploy.sh
          docker ps

    - name: CI Pipeline Completed
      run: echo "Pipeline completed successfully!"

    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "✅ Autonomous DevSecOps Pipeline SUCCESS"
        to: ${{ secrets.EMAIL_USERNAME }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Project : Autonomous DevSecOps Framework
          Pipeline Status : SUCCESS
          AI Security Report : Generated
          Deployment : EC2 Successful

    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "❌ Autonomous DevSecOps Pipeline FAILED"
        to: ${{ secrets.EMAIL_USERNAME }}
        from: ${{ secrets.EMAIL_USERNAME }}
        body: |
          Project : Autonomous DevSecOps Framework
          Pipeline Status : FAILED
          Deployment : Blocked

    - name: Send Slack Success Notification
      if: success()
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "✅ *Autonomous DevSecOps Pipeline SUCCESS*\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nDeployment: EC2 Successful 🚀"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Send Slack Failure Notification
      if: failure()
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "❌ *Autonomous DevSecOps Pipeline FAILED*\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nDeployment: Blocked"
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Send Discord Success Notification
      if: success()
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: |
          ✅ **Autonomous DevSecOps Pipeline SUCCESS**

          Repository: ${{ github.repository }}

          Branch: ${{ github.ref_name }}

          Commit: ${{ github.sha }}

          Deployment: EC2 Successful 🚀

    - name: Send Discord Failure Notification
      if: failure()
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: |
          ❌ **Autonomous DevSecOps Pipeline FAILED**

          Repository: ${{ github.repository }}

          Branch: ${{ github.ref_name }}

          Commit: ${{ github.sha }}

          Deployment: Failed

          Please check GitHub Actions logs.

